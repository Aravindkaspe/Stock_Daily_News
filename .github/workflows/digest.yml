name: Stock Digest

on:
  schedule:
    # GitHub Actions cron is in UTC. CST = UTC-6.
    # 6am CST  = 12:00 UTC
    # 7pm CST  = 01:00 UTC (next day)
    - cron: "0 12 * * 1-5"   # 6am CST, weekdays — US market open hours
    - cron: "0 1 * * 1-5"    # 7pm CST, weekdays — Indian market window
  workflow_dispatch:
    inputs:
      market:
        description: "Which market to digest"
        type: choice
        options: [us, india]
        default: us

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine market
        id: market
        run: |
          if [ -n "${{ github.event.inputs.market }}" ]; then
            echo "market=${{ github.event.inputs.market }}" >> $GITHUB_OUTPUT
          else
            # Cron-driven: pick market based on UTC hour
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ]; then
              echo "market=us" >> $GITHUB_OUTPUT
            else
              echo "market=india" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_KEY: ${{ secrets.GMAIL_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: python -m stock_news_daily.run --market ${{ steps.market.outputs.market }}
