name: Stock Digest

on:
  schedule:
    # GitHub Actions cron is UTC. Scheduled 3hrs early to absorb GitHub's typical delay.
    # Currently CDT (UTC-5, Mar–Nov): update to 09 & 22 UTC in November when CST begins.
    # 6am CDT = 11:00 UTC → trigger at 08:00 UTC
    # 7pm CDT = 00:00 UTC → trigger at 21:00 UTC
    - cron: "0 8 * * 1-5"    # → ~6am CDT after delay — US digest
    - cron: "0 21 * * 1-5"   # → ~7pm CDT after delay — India digest
  workflow_dispatch:
    inputs:
      market:
        description: "Which market to digest"
        type: choice
        options: [us, india]
        default: us

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine market
        id: market
        run: |
          if [ -n "${{ github.event.inputs.market }}" ]; then
            echo "market=${{ github.event.inputs.market }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 * * 1-5" ] || [ "${{ github.event.schedule }}" = "0 9 * * 1-5" ]; then
            echo "market=us" >> $GITHUB_OUTPUT
          else
            echo "market=india" >> $GITHUB_OUTPUT
          fi

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_KEY: ${{ secrets.GMAIL_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: python -m stock_news_daily.run --market ${{ steps.market.outputs.market }}
